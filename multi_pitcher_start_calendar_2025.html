function clr(ip){
  if(ip<1.0) return {bg:'#E24B4A',fg:'#501313'};
  if(ip<2.0) return {bg:'#F09595',fg:'#791F1F'};
  if(ip<4.0) return {bg:'#FAC775',fg:'#633806'};
  if(ip<5.0) return {bg:'#B5D4F4',fg:'#0C447C'};
  if(ip<6.0) return {bg:'#9FE1CB',fg:'#085041'};
  return {bg:'#5DCAA5',fg:'#04342C'};
}

function isShort(ip){ return ip < 4.0; }

function buildMonth(starts, {y,m,name,days}){
  const fd=new Date(y,m-1,1).getDay();
  const dl=['S','M','T','W','T','F','S'];
  let h=`<div style="min-width:0;">
    <div style="font-size:10px;font-weight:500;color:var(--color-text-secondary);margin-bottom:3px;text-align:center;">${name}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:1px;">
      ${dl.map(d=>`<div style="text-align:center;font-size:7px;color:var(--color-text-tertiary);">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;">`;
  for(let i=0;i<fd;i++) h+='<div></div>';
  for(let day=1;day<=days;day++){
    const key=`${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const s=starts[key];
    if(s){
      const c=clr(s.ip);
      const border=isShort(s.ip)?`outline:1.5px solid ${c.fg};outline-offset:-1px;`:'';
      h+=`<div style="background:${c.bg};border-radius:2px;${border}display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:28px;cursor:default;" title="${key.slice(5)} · ${s.result} vs ${s.opp} · ${s.ip} IP · ${s.p}P · ${s.rest}d rest">
        <span style="font-size:8px;font-weight:500;color:${c.fg};line-height:1.2;">${day}</span>
        <span style="font-size:7px;color:${c.fg};opacity:0.85;line-height:1.1;">${s.ip}</span>
      </div>`;
    } else {
      h+=`<div style="display:flex;align-items:center;justify-content:center;min-height:28px;">
        <span style="font-size:7px;color:var(--color-text-tertiary);">${day}</span>
      </div>`;
    }
  }
  h+='</div></div>';
  return h;
}

function buildAftermath(starts){
  const sorted=Object.keys(starts).sort();
  const pairs=[];
  for(let i=0;i<sorted.length;i++){
    const k=sorted[i];
    const s=starts[k];
    if(isShort(s.ip)){
      pairs.push({sKey:k,nKey:sorted[i+1]||null});
    }
  }
  if(!pairs.length) return `<div style="font-size:12px;color:var(--color-text-secondary);font-style:italic;padding:8px 0;">No short starts (< 4 IP) this season.</div>`;

  const total=sorted.length;
  const movedUp=pairs.filter(p=>p.nKey&&starts[p.nKey].rest<=5).length;

  let h=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">
    <div style="background:var(--color-background-secondary);border-radius:8px;padding:8px 10px;">
      <div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:1px;">short starts</div>
      <div style="font-size:20px;font-weight:500;color:var(--color-text-primary);">${pairs.length}<span style="font-size:12px;font-weight:400;color:var(--color-text-secondary);"> / ${total}</span></div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:8px;padding:8px 10px;">
      <div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:1px;">skipped turn</div>
      <div style="font-size:20px;font-weight:500;color:var(--color-text-primary);">0</div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:8px;padding:8px 10px;">
      <div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:1px;">moved up</div>
      <div style="font-size:20px;font-weight:500;color:var(--color-text-primary);">${movedUp}</div>
    </div>
  </div>`;

  for(const {sKey,nKey} of pairs){
    const s=starts[sKey];
    const n=nKey?starts[nKey]:null;
    const sc=clr(s.ip);
    const nc=n?clr(n.ip):null;
    const restLabel=n?`${n.rest}d rest`:'—';
    const movedUpFlag=n&&n.rest<=5;
    const skipFlag=n&&n.rest>=14;
    let badge='';
    if(movedUpFlag) badge=`<div style="font-size:8px;color:#185FA5;margin-top:1px;">moved up</div>`;
    if(skipFlag) badge=`<div style="font-size:8px;color:#A32D2D;margin-top:1px;">skipped turn?</div>`;
    h+=`<div style="display:grid;grid-template-columns:1fr 46px 1fr;align-items:center;gap:5px;margin-bottom:6px;">
      <div style="background:${sc.bg};outline:1.5px solid ${sc.fg};outline-offset:-1px;border-radius:7px;padding:7px 10px;">
        <div style="font-size:8px;color:${sc.fg};opacity:0.7;margin-bottom:1px;">${sKey.slice(5)} · vs ${s.opp}</div>
        <div style="font-size:18px;font-weight:500;color:${sc.fg};line-height:1.1;">${s.ip} IP</div>
        <div style="font-size:9px;color:${sc.fg};opacity:0.75;margin-top:1px;">${s.p}P · ${s.result}</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:14px;color:var(--color-text-tertiary);">→</div>
        <div style="font-size:8px;color:var(--color-text-secondary);">${restLabel}</div>
        ${badge}
      </div>
      ${n?`<div style="background:${nc.bg};border-radius:7px;padding:7px 10px;">
        <div style="font-size:8px;color:${nc.fg};opacity:0.7;margin-bottom:1px;">${nKey.slice(5)} · vs ${n.opp}</div>
        <div style="font-size:18px;font-weight:500;color:${nc.fg};line-height:1.1;">${n.ip} IP</div>
        <div style="font-size:9px;color:${nc.fg};opacity:0.75;margin-top:1px;">${n.p}P · ${n.result}</div>
      </div>`:`<div style="border:0.5px dashed var(--color-border-secondary);border-radius:7px;display:flex;align-items:center;justify-content:center;min-height:56px;"><span style="font-size:10px;color:var(--color-text-tertiary);">end of season</span></div>`}
    </div>`;
  }
  return h;
}

function render(idx){
  const p=ALL[idx];
  const sortedKeys=Object.keys(p.starts).sort();
  const firstMonth=parseInt(sortedKeys[0].split('-')[1]);
  const lastMonth=parseInt(sortedKeys[sortedKeys.length-1].split('-')[1]);
  const activeMths=MONTHS.filter(m=>m.m>=firstMonth&&m.m<=lastMonth);
  const calCols=Math.min(activeMths.length,6);

  const legend=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
    ${[
      {ip:0.2,lbl:'< 1 IP'},
      {ip:1.0,lbl:'1–3.2 IP'},
      {ip:4.0,lbl:'4–4.2 IP'},
      {ip:5.0,lbl:'5–5.2 IP'},
      {ip:6.0,lbl:'6+ IP'}
    ].map(({ip,lbl})=>{
      const c=clr(ip);
      return `<span style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--color-text-secondary);">
        <span style="width:8px;height:8px;border-radius:2px;background:${c.bg};display:inline-block;flex-shrink:0;"></span>${lbl}
      </span>`;
    }).join('')}
    <span style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--color-text-secondary);">
      <span style="width:8px;height:8px;border-radius:2px;background:#FAC775;outline:1.5px solid #633806;outline-offset:0;display:inline-block;flex-shrink:0;"></span>outlined = short
    </span>
  </div>`;

  const calGrid=`<div style="display:grid;grid-template-columns:repeat(${calCols},1fr);gap:10px;margin-bottom:22px;">
    ${activeMths.map(m=>buildMonth(p.starts,m)).join('')}
  </div>`;

  document.getElementById('cal-content').innerHTML=`
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px;">${p.team} · ${p.level} · ${Object.keys(p.starts).length} GS</div>
    ${legend}
    ${calGrid}
    <div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:16px;">
      <div style="font-size:13px;font-weight:500;margin-bottom:3px;">After short starts (< 4 IP)</div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:12px;">Schedule management + next outing quality · hover tiles for full line</div>
      ${buildAftermath(p.starts)}
    </div>
  `;

  document.querySelectorAll('.ptab').forEach((el,i)=>{
    el.style.background=i===idx?'var(--color-background-secondary)':'transparent';
    el.style.fontWeight=i===idx?'500':'400';
    el.style.color=i===idx?'var(--color-text-primary)':'var(--color-text-secondary)';
    el.style.borderBottom=i===idx?'2px solid var(--color-text-primary)':'2px solid transparent';
  });
}

const tabs=ALL.map((p,i)=>`<button class="ptab" onclick="window._selectPitcher(${i})" style="padding:6px 10px;background:transparent;border:none;border-bottom:2px solid transparent;border-radius:0;cursor:pointer;font-size:12px;white-space:nowrap;transition:none;">${p.short}</button>`).join('');

document.getElementById('root').innerHTML=`
  <div style="font-size:15px;font-weight:500;margin-bottom:10px;">2025 Start Calendar</div>
  <div style="display:flex;flex-wrap:wrap;gap:0;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:14px;overflow-x:auto;">
    ${tabs}
  </div>
  <div id="cal-content"></div>
`;

window._selectPitcher=function(i){ render(i); };
render(0);
})();
</script>
